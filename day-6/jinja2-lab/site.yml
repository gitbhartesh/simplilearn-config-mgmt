---
- name: Create multiple users using Jinja2
  hosts: webservers
  become: yes

  vars_files:
    - vars.yml

  tasks:

    - name: Install required packages
      apt:
        name: bash
        state: present
        update_cache: yes

    - name: Generate user creation script from template
      template:
        src: templates/users.sh.j2
        dest: /tmp/users.sh
        mode: '0755'

    - name: Run the user creation script
      command: /tmp/users.sh